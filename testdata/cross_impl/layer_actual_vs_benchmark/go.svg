        <polyline class="prism-mark-line" data-prism-id="line-0" points="40,160 780,50" fill="none" stroke="#3366cc" stroke-width="1.5"/>
      </g>
      <g class="prism-layer" data-layer-id="layer-1">
        <polyline class="prism-mark-line" data-prism-id="line-0" points="40,60 780,60" fill="none" stroke="#999999" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <g class="prism-axes" data-shared="true">

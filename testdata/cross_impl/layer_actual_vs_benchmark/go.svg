    <g class="prism-axis prism-axis-y" data-prism-axis-id="y-axis"><line class="prism-grid-line" x1="40" y1="560" x2="780" y2="560"/><line class="prism-grid-line" x1="40" y1="460" x2="780" y2="460"/><line class="prism-grid-line" x1="40" y1="360" x2="780" y2="360"/><line class="prism-grid-line" x1="40" y1="260" x2="780" y2="260"/><line class="prism-grid-line" x1="40" y1="160" x2="780" y2="160"/><line class="prism-grid-line" x1="40" y1="60" x2="780" y2="60"/><line class="prism-axis-domain" x1="40" y1="50" x2="40" y2="560"/><line class="prism-axis-tick" x1="40" y1="560" x2="35" y2="560"/><text class="prism-axis-label" x="32" y="564" text-anchor="end">0</text><line class="prism-axis-tick" x1="40" y1="510" x2="37" y2="510"/><line class="prism-axis-tick" x1="40" y1="460" x2="35" y2="460"/><line class="prism-axis-tick" x1="40" y1="410" x2="37" y2="410"/><line class="prism-axis-tick" x1="40" y1="360" x2="35" y2="360"/><text class="prism-axis-label" x="32" y="364" text-anchor="end">0.2</text><line class="prism-axis-tick" x1="40" y1="310" x2="37" y2="310"/><line class="prism-axis-tick" x1="40" y1="260" x2="35" y2="260"/><line class="prism-axis-tick" x1="40" y1="210" x2="37" y2="210"/><line class="prism-axis-tick" x1="40" y1="160" x2="35" y2="160"/><text class="prism-axis-label" x="32" y="164" text-anchor="end">0.4</text><line class="prism-axis-tick" x1="40" y1="110" x2="37" y2="110"/><line class="prism-axis-tick" x1="40" y1="60" x2="35" y2="60"/><text class="prism-axis-title" x="10" y="305" text-anchor="middle" transform="rotate(-90 10 305)">score</text></g>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" overflow="hidden">
  <style>:root{--prism-color-axis:#6b7280;--prism-color-grid:#e5e7eb;--prism-color-text:#111827;--prism-color-bg:transparent;--prism-font-sans:Inter, system-ui, sans-serif;--prism-font-mono:ui-monospace, SF Mono, monospace;--prism-font-size-label:11px;--prism-font-size-title:16px;--prism-font-size-axis-title:12px;}.prism-axis-domain{stroke:var(--prism-color-axis);fill:none;}.prism-axis-tick{stroke:var(--prism-color-axis);}.prism-axis-label{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-label,11px);}.prism-axis-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-axis-title,12px);font-weight:600;}.prism-grid-line{stroke:var(--prism-color-grid);}.prism-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-title,16px);font-weight:600;}.prism-legend-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:12px;font-weight:600;}.prism-legend-label{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:11px;}.prism-legend-swatch{stroke:none;}.prism-selected{opacity:var(--prism-selected-opacity,1);}.prism-deselected{opacity:var(--prism-deselected-opacity,0.3);}</style>

  <g class="prism-scene" data-scene-id="scene-0">
    <text class="prism-title" x="410" y="20" text-anchor="middle">Green for high scores, red for negatives</text>
    <g class="prism-axes">
      <g class="prism-axis prism-axis-x" data-prism-axis-id="x-axis"><line class="prism-grid-line" x1="114" y1="50" x2="114" y2="560"/><line class="prism-grid-line" x1="262" y1="50" x2="262" y2="560"/><line class="prism-grid-line" x1="410" y1="50" x2="410" y2="560"/><line class="prism-grid-line" x1="558" y1="50" x2="558" y2="560"/><line class="prism-grid-line" x1="706" y1="50" x2="706" y2="560"/><line class="prism-axis-domain" x1="40" y1="560" x2="780" y2="560"/><line class="prism-axis-tick" x1="114" y1="560" x2="114" y2="565"/><text class="prism-axis-label" x="114" y="578" text-anchor="middle">west</text><line class="prism-axis-tick" x1="262" y1="560" x2="262" y2="565"/><text class="prism-axis-label" x="262" y="578" text-anchor="middle">east</text><line class="prism-axis-tick" x1="410" y1="560" x2="410" y2="565"/><text class="prism-axis-label" x="410" y="578" text-anchor="middle">north</text><line class="prism-axis-tick" x1="558" y1="560" x2="558" y2="565"/><text class="prism-axis-label" x="558" y="578" text-anchor="middle">south</text><line class="prism-axis-tick" x1="706" y1="560" x2="706" y2="565"/><text class="prism-axis-label" x="706" y="578" text-anchor="middle">central</text><text class="prism-axis-title" x="410" y="594" text-anchor="middle">region</text></g>
      <g class="prism-axis prism-axis-y" data-prism-axis-id="y-axis"><line class="prism-grid-line" x1="40" y1="492" x2="780" y2="492"/><line class="prism-grid-line" x1="40" y1="378.667" x2="780" y2="378.667"/><line class="prism-grid-line" x1="40" y1="265.333" x2="780" y2="265.333"/><line class="prism-grid-line" x1="40" y1="152" x2="780" y2="152"/><line class="prism-axis-domain" x1="40" y1="50" x2="40" y2="560"/><line class="prism-axis-tick" x1="40" y1="492" x2="35" y2="492"/><text class="prism-axis-label" x="32" y="496" text-anchor="end">0</text><line class="prism-axis-tick" x1="40" y1="435.333" x2="37" y2="435.333"/><line class="prism-axis-tick" x1="40" y1="378.667" x2="35" y2="378.667"/><line class="prism-axis-tick" x1="40" y1="322" x2="37" y2="322"/><line class="prism-axis-tick" x1="40" y1="265.333" x2="35" y2="265.333"/><text class="prism-axis-label" x="32" y="269.333" text-anchor="end">0.4</text><line class="prism-axis-tick" x1="40" y1="208.667" x2="37" y2="208.667"/><line class="prism-axis-tick" x1="40" y1="152" x2="35" y2="152"/><text class="prism-axis-title" x="10" y="305" text-anchor="middle" transform="rotate(-90 10 305)">delta</text></g>
    </g>
    <g class="prism-plot">
      <g class="prism-layer" data-layer-id="layer-0" data-prism-layer="layer-0">
        <rect class="prism-mark-bar" data-prism-id="bar-0" data-prism-datum-row="0" x="47.4" y="492" width="133.2" height="68" fill="#ef4444"/>
        <rect class="prism-mark-bar" data-prism-id="bar-1" data-prism-datum-row="1" x="195.4" y="299.333" width="133.2" height="192.667" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="bar-2" data-prism-datum-row="2" x="343.4" y="50" width="133.2" height="442" fill="#22c55e"/>
        <rect class="prism-mark-bar" data-prism-id="bar-3" data-prism-datum-row="3" x="491.4" y="492" width="133.2" height="28.333" fill="#ef4444"/>
        <rect class="prism-mark-bar" data-prism-id="bar-4" data-prism-datum-row="4" x="639.4" y="390" width="133.2" height="102" fill="#3b82f6"/>
      </g>
    </g>
  </g>
</svg>

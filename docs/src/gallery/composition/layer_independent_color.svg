<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" overflow="hidden">
  <style>:root{--prism-color-axis:#6b7280;--prism-color-grid:#e5e7eb;--prism-color-text:#111827;--prism-color-bg:transparent;--prism-font-sans:Inter, system-ui, sans-serif;--prism-font-mono:ui-monospace, SF Mono, monospace;--prism-font-size-label:11px;--prism-font-size-title:16px;--prism-font-size-axis-title:12px;--prism-axis-domain-color:#6b7280;--prism-axis-domain-width:1px;--prism-axis-tick-color:#6b7280;--prism-axis-tick-width:1px;--prism-axis-tick-size:5px;--prism-grid-color:#e5e7eb;--prism-grid-width:1px;--prism-axis-label-color:#111827;--prism-axis-label-font-size:11px;--prism-axis-label-padding:4px;--prism-axis-title-color:#111827;--prism-axis-title-font-size:12px;--prism-axis-title-padding:8px;--prism-legend-padding:8px;--prism-legend-symbol-size:64px;--prism-legend-label-color:#111827;--prism-legend-label-font-size:11px;--prism-legend-title-color:#111827;--prism-legend-title-font-size:12px;--prism-legend-title-font-weight:600;--prism-legend-row-padding:4px;--prism-title-color:#111827;--prism-title-font-size:16px;--prism-title-font-weight:600;--prism-title-anchor:start;--prism-title-padding:12px;--prism-view-bg:transparent;--prism-view-padding:0px;--prism-mark-fill:#4c78a8;--prism-mark-stroke-width:0px;--prism-mark-opacity:1;--prism-mark-arc-stroke:#ffffff;--prism-mark-arc-stroke-width:1px;--prism-mark-area-fill:#4c78a8;--prism-mark-area-opacity:0.7;--prism-mark-bar-fill:#4c78a8;--prism-mark-bar-corner-radius:0px;--prism-mark-geopoint-fill:#4c78a8;--prism-mark-geopoint-stroke-width:0px;--prism-mark-geopoint-size:36;--prism-mark-geoshape-fill:#cbd5e1;--prism-mark-geoshape-stroke:#ffffff;--prism-mark-geoshape-stroke-width:0.5px;--prism-mark-line-fill:transparent;--prism-mark-line-stroke:#4c78a8;--prism-mark-line-stroke-width:1.5px;--prism-mark-point-fill:#4c78a8;--prism-mark-point-stroke-width:0px;--prism-mark-point-size:64;--prism-mark-rule-stroke:#4c78a8;--prism-mark-rule-stroke-width:1px;--prism-mark-text-fill:#111827;--prism-mark-text-font-size:11px;--prism-mark-tick-stroke:#4c78a8;--prism-mark-tick-stroke-width:1px;--prism-deselected-opacity:0.3;--prism-selected-opacity:1;}.prism-axis-domain{stroke:var(--prism-axis-domain-color,var(--prism-color-axis));stroke-width:var(--prism-axis-domain-width,1px);fill:none;}.prism-axis-tick{stroke:var(--prism-axis-tick-color,var(--prism-color-axis));stroke-width:var(--prism-axis-tick-width,1px);}.prism-axis-label{fill:var(--prism-axis-label-color,var(--prism-color-text));font-family:var(--prism-font-sans);font-size:var(--prism-axis-label-font-size,var(--prism-font-size-label,11px));font-weight:var(--prism-axis-label-font-weight,400);}.prism-axis-title{fill:var(--prism-axis-title-color,var(--prism-color-text));font-family:var(--prism-font-sans);font-size:var(--prism-axis-title-font-size,var(--prism-font-size-axis-title,12px));font-weight:var(--prism-axis-title-font-weight,600);}.prism-grid-line{stroke:var(--prism-grid-color,var(--prism-color-grid));stroke-width:var(--prism-grid-width,1px);}.prism-title{fill:var(--prism-title-color,var(--prism-color-text));font-family:var(--prism-font-sans);font-size:var(--prism-title-font-size,var(--prism-font-size-title,16px));font-weight:var(--prism-title-font-weight,600);}.prism-legend-title{fill:var(--prism-legend-title-color,var(--prism-color-text));font-family:var(--prism-font-sans);font-size:var(--prism-legend-title-font-size,12px);font-weight:var(--prism-legend-title-font-weight,600);}.prism-legend-label{fill:var(--prism-legend-label-color,var(--prism-color-text));font-family:var(--prism-font-sans);font-size:var(--prism-legend-label-font-size,11px);}.prism-legend-swatch{stroke:none;}.prism-selected{opacity:var(--prism-selected-opacity,1);}.prism-deselected{opacity:var(--prism-deselected-opacity,0.3);}</style>

  <g class="prism-scene" data-scene-id="scene-0">
    <text class="prism-title" x="410" y="20" text-anchor="middle">Independent color legends per layer</text>
    <g class="prism-plot">
      <g class="prism-layer" data-layer-id="layer-0" data-prism-layer="layer-0">
        <rect class="prism-mark-bar" data-prism-id="bar-0" data-prism-datum-row="0" x="49.25" y="356" width="166.5" height="204" fill="#4c78a8"/>
        <rect class="prism-mark-bar" data-prism-id="bar-1" data-prism-datum-row="1" x="234.25" y="254" width="166.5" height="306" fill="#4c78a8"/>
        <rect class="prism-mark-bar" data-prism-id="bar-2" data-prism-datum-row="2" x="419.25" y="152" width="166.5" height="408" fill="#4c78a8"/>
        <rect class="prism-mark-bar" data-prism-id="bar-3" data-prism-datum-row="3" x="604.25" y="50" width="166.5" height="510" fill="#4c78a8"/>
      </g>
      <g class="prism-layer" data-layer-id="layer-1" data-prism-layer="layer-1">
        <circle class="prism-mark-point" data-prism-id="point-0" data-prism-datum-row="0" cx="49.25" cy="410.4" r="4" fill="#4c78a8"/>
        <circle class="prism-mark-point" data-prism-id="point-1" data-prism-datum-row="1" cx="234.25" cy="437.6" r="4" fill="#4c78a8"/>
        <circle class="prism-mark-point" data-prism-id="point-2" data-prism-datum-row="2" cx="419.25" cy="498.8" r="4" fill="#f58518"/>
        <circle class="prism-mark-point" data-prism-id="point-3" data-prism-datum-row="3" cx="604.25" cy="464.8" r="4" fill="#f58518"/>
      </g>
    </g>
    <g class="prism-legends"><g class="prism-legend prism-legend-color" data-prism-legend-id="legend-color"><text class="prism-legend-title" x="680" y="64">layer-0: team</text><rect class="prism-legend-swatch" x="680" y="76" width="12" height="12" fill="#4c78a8"/><text class="prism-legend-label" x="698" y="86">alpha</text><rect class="prism-legend-swatch" x="680" y="94" width="12" height="12" fill="#f58518"/><text class="prism-legend-label" x="698" y="104">beta</text></g><g class="prism-legend prism-legend-color" data-prism-legend-id="legend-color"><text class="prism-legend-title" x="680" y="64">layer-1: category</text><rect class="prism-legend-swatch" x="680" y="76" width="12" height="12" fill="#4c78a8"/><text class="prism-legend-label" x="698" y="86">premium</text><rect class="prism-legend-swatch" x="680" y="94" width="12" height="12" fill="#f58518"/><text class="prism-legend-label" x="698" y="104">standard</text></g></g>
  </g>

  <g class="prism-axes" data-shared="true">
    <g class="prism-axis prism-axis-x" data-prism-axis-id="x-axis"><line class="prism-grid-line" x1="132.5" y1="50" x2="132.5" y2="560"/><line class="prism-grid-line" x1="317.5" y1="50" x2="317.5" y2="560"/><line class="prism-grid-line" x1="502.5" y1="50" x2="502.5" y2="560"/><line class="prism-grid-line" x1="687.5" y1="50" x2="687.5" y2="560"/><line class="prism-axis-domain" x1="40" y1="560" x2="780" y2="560"/><line class="prism-axis-tick" x1="132.5" y1="560" x2="132.5" y2="565"/><text class="prism-axis-label" x="132.5" y="578" text-anchor="middle">north</text><line class="prism-axis-tick" x1="317.5" y1="560" x2="317.5" y2="565"/><text class="prism-axis-label" x="317.5" y="578" text-anchor="middle">east</text><line class="prism-axis-tick" x1="502.5" y1="560" x2="502.5" y2="565"/><text class="prism-axis-label" x="502.5" y="578" text-anchor="middle">south</text><line class="prism-axis-tick" x1="687.5" y1="560" x2="687.5" y2="565"/><text class="prism-axis-label" x="687.5" y="578" text-anchor="middle">west</text><text class="prism-axis-title" x="410" y="594" text-anchor="middle">x</text></g>
    <g class="prism-axis prism-axis-y" data-prism-axis-id="y-axis"><line class="prism-grid-line" x1="40" y1="560" x2="780" y2="560"/><line class="prism-grid-line" x1="40" y1="424" x2="780" y2="424"/><line class="prism-grid-line" x1="40" y1="288" x2="780" y2="288"/><line class="prism-grid-line" x1="40" y1="152" x2="780" y2="152"/><line class="prism-axis-domain" x1="40" y1="50" x2="40" y2="560"/><line class="prism-axis-tick" x1="40" y1="560" x2="35" y2="560"/><text class="prism-axis-label" x="32" y="564" text-anchor="end">0</text><line class="prism-axis-tick" x1="40" y1="492" x2="37" y2="492"/><line class="prism-axis-tick" x1="40" y1="424" x2="35" y2="424"/><line class="prism-axis-tick" x1="40" y1="356" x2="37" y2="356"/><line class="prism-axis-tick" x1="40" y1="288" x2="35" y2="288"/><text class="prism-axis-label" x="32" y="292" text-anchor="end">40</text><line class="prism-axis-tick" x1="40" y1="220" x2="37" y2="220"/><line class="prism-axis-tick" x1="40" y1="152" x2="35" y2="152"/><text class="prism-axis-title" x="10" y="305" text-anchor="middle" transform="rotate(-90 10 305)">y</text></g>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" overflow="hidden">
  <style>:root{--prism-color-axis:#6b7280;--prism-color-grid:#e5e7eb;--prism-color-text:#111827;--prism-color-bg:transparent;--prism-font-sans:Inter, system-ui, sans-serif;--prism-font-mono:ui-monospace, SF Mono, monospace;--prism-font-size-label:11px;--prism-font-size-title:16px;--prism-font-size-axis-title:12px;}.prism-axis-domain{stroke:var(--prism-color-axis);fill:none;}.prism-axis-tick{stroke:var(--prism-color-axis);}.prism-axis-label{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-label,11px);}.prism-axis-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-axis-title,12px);font-weight:600;}.prism-grid-line{stroke:var(--prism-color-grid);}.prism-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-title,16px);font-weight:600;}.prism-legend-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:12px;font-weight:600;}.prism-legend-label{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:11px;}.prism-legend-swatch{stroke:none;}.prism-selected{opacity:var(--prism-selected-opacity,1);}.prism-deselected{opacity:var(--prism-deselected-opacity,0.3);}</style>

  <g class="prism-scene" data-scene-id="scene-0">
    <text class="prism-title" x="410" y="20" text-anchor="middle">Independent color legends per layer</text>
    <g class="prism-plot">
      <g class="prism-layer" data-layer-id="layer-0" data-prism-layer="layer-0">
        <rect class="prism-mark-bar" data-prism-id="bar-0" data-prism-datum-row="0" x="49.25" y="356" width="166.5" height="204" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="bar-1" data-prism-datum-row="1" x="234.25" y="254" width="166.5" height="306" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="bar-2" data-prism-datum-row="2" x="419.25" y="152" width="166.5" height="408" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="bar-3" data-prism-datum-row="3" x="604.25" y="50" width="166.5" height="510" fill="#3b82f6"/>
      </g>
      <g class="prism-layer" data-layer-id="layer-1" data-prism-layer="layer-1">
        <circle class="prism-mark-point" data-prism-id="point-0" data-prism-datum-row="0" cx="49.25" cy="410.4" r="4" fill="#3b82f6"/>
        <circle class="prism-mark-point" data-prism-id="point-1" data-prism-datum-row="1" cx="234.25" cy="437.6" r="4" fill="#3b82f6"/>
        <circle class="prism-mark-point" data-prism-id="point-2" data-prism-datum-row="2" cx="419.25" cy="498.8" r="4" fill="#ef4444"/>
        <circle class="prism-mark-point" data-prism-id="point-3" data-prism-datum-row="3" cx="604.25" cy="464.8" r="4" fill="#ef4444"/>
      </g>
    </g>
    <g class="prism-legends"><g class="prism-legend prism-legend-color" data-prism-legend-id="legend-color"><text class="prism-legend-title" x="680" y="64">layer-0: team</text><rect class="prism-legend-swatch" x="680" y="76" width="12" height="12" fill="#3b82f6"/><text class="prism-legend-label" x="698" y="86">alpha</text><rect class="prism-legend-swatch" x="680" y="94" width="12" height="12" fill="#ef4444"/><text class="prism-legend-label" x="698" y="104">beta</text></g><g class="prism-legend prism-legend-color" data-prism-legend-id="legend-color"><text class="prism-legend-title" x="680" y="64">layer-1: category</text><rect class="prism-legend-swatch" x="680" y="76" width="12" height="12" fill="#3b82f6"/><text class="prism-legend-label" x="698" y="86">premium</text><rect class="prism-legend-swatch" x="680" y="94" width="12" height="12" fill="#ef4444"/><text class="prism-legend-label" x="698" y="104">standard</text></g></g>
  </g>

  <g class="prism-axes" data-shared="true">
    <g class="prism-axis prism-axis-x" data-prism-axis-id="x-axis"><line class="prism-grid-line" x1="132.5" y1="50" x2="132.5" y2="560"/><line class="prism-grid-line" x1="317.5" y1="50" x2="317.5" y2="560"/><line class="prism-grid-line" x1="502.5" y1="50" x2="502.5" y2="560"/><line class="prism-grid-line" x1="687.5" y1="50" x2="687.5" y2="560"/><line class="prism-axis-domain" x1="40" y1="560" x2="780" y2="560"/><line class="prism-axis-tick" x1="132.5" y1="560" x2="132.5" y2="565"/><text class="prism-axis-label" x="132.5" y="578" text-anchor="middle">north</text><line class="prism-axis-tick" x1="317.5" y1="560" x2="317.5" y2="565"/><text class="prism-axis-label" x="317.5" y="578" text-anchor="middle">east</text><line class="prism-axis-tick" x1="502.5" y1="560" x2="502.5" y2="565"/><text class="prism-axis-label" x="502.5" y="578" text-anchor="middle">south</text><line class="prism-axis-tick" x1="687.5" y1="560" x2="687.5" y2="565"/><text class="prism-axis-label" x="687.5" y="578" text-anchor="middle">west</text><text class="prism-axis-title" x="410" y="594" text-anchor="middle">x</text></g>
    <g class="prism-axis prism-axis-y" data-prism-axis-id="y-axis"><line class="prism-grid-line" x1="40" y1="560" x2="780" y2="560"/><line class="prism-grid-line" x1="40" y1="424" x2="780" y2="424"/><line class="prism-grid-line" x1="40" y1="288" x2="780" y2="288"/><line class="prism-grid-line" x1="40" y1="152" x2="780" y2="152"/><line class="prism-axis-domain" x1="40" y1="50" x2="40" y2="560"/><line class="prism-axis-tick" x1="40" y1="560" x2="35" y2="560"/><text class="prism-axis-label" x="32" y="564" text-anchor="end">0</text><line class="prism-axis-tick" x1="40" y1="492" x2="37" y2="492"/><line class="prism-axis-tick" x1="40" y1="424" x2="35" y2="424"/><line class="prism-axis-tick" x1="40" y1="356" x2="37" y2="356"/><line class="prism-axis-tick" x1="40" y1="288" x2="35" y2="288"/><text class="prism-axis-label" x="32" y="292" text-anchor="end">40</text><line class="prism-axis-tick" x1="40" y1="220" x2="37" y2="220"/><line class="prism-axis-tick" x1="40" y1="152" x2="35" y2="152"/><text class="prism-axis-title" x="10" y="305" text-anchor="middle" transform="rotate(-90 10 305)">y</text></g>
  </g>
</svg>

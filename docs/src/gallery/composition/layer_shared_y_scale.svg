        <line class="prism-mark-rule" data-prism-id="rule-1" data-prism-datum-row="1" x1="233.75" y1="254" x2="234.75" y2="254" stroke="#dc2626" stroke-width="1.5"/>
        <line class="prism-mark-rule" data-prism-id="rule-2" data-prism-datum-row="2" x1="418.75" y1="152" x2="419.75" y2="152" stroke="#dc2626" stroke-width="1.5"/>
        <line class="prism-mark-rule" data-prism-id="rule-3" data-prism-datum-row="3" x1="603.75" y1="50" x2="604.75" y2="50" stroke="#dc2626" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <g class="prism-axes" data-shared="true">
    <g class="prism-axis prism-axis-x" data-prism-axis-id="x-axis"><line class="prism-grid-line" x1="132.5" y1="50" x2="132.5" y2="560"/><line class="prism-grid-line" x1="317.5" y1="50" x2="317.5" y2="560"/><line class="prism-grid-line" x1="502.5" y1="50" x2="502.5" y2="560"/><line class="prism-grid-line" x1="687.5" y1="50" x2="687.5" y2="560"/><line class="prism-axis-domain" x1="40" y1="560" x2="780" y2="560"/><line class="prism-axis-tick" x1="132.5" y1="560" x2="132.5" y2="565"/><text class="prism-axis-label" x="132.5" y="578" text-anchor="middle">a</text><line class="prism-axis-tick" x1="317.5" y1="560" x2="317.5" y2="565"/><text class="prism-axis-label" x="317.5" y="578" text-anchor="middle">b</text><line class="prism-axis-tick" x1="502.5" y1="560" x2="502.5" y2="565"/><text class="prism-axis-label" x="502.5" y="578" text-anchor="middle">c</text><line class="prism-axis-tick" x1="687.5" y1="560" x2="687.5" y2="565"/><text class="prism-axis-label" x="687.5" y="578" text-anchor="middle">d</text><text class="prism-axis-title" x="410" y="594" text-anchor="middle">x</text></g>

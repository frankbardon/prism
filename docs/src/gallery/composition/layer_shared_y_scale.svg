        <rect class="prism-mark-bar" data-prism-id="bar-2" data-prism-datum-row="2" x="419.25" y="432.5" width="166.5" height="127.5" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="bar-3" data-prism-datum-row="3" x="604.25" y="305" width="166.5" height="255" fill="#3b82f6"/>
      </g>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" overflow="hidden">
  <style>:root{--prism-color-axis:#6b7280;--prism-color-grid:#e5e7eb;--prism-color-text:#111827;--prism-color-bg:transparent;--prism-font-sans:Inter, system-ui, sans-serif;--prism-font-mono:ui-monospace, SF Mono, monospace;--prism-font-size-label:11px;--prism-font-size-title:16px;--prism-font-size-axis-title:12px;--prism-axis-domain-color:#6b7280;--prism-axis-domain-width:1px;--prism-axis-tick-color:#6b7280;--prism-axis-tick-width:1px;--prism-axis-tick-size:5px;--prism-grid-color:#e5e7eb;--prism-grid-width:1px;--prism-axis-label-color:#111827;--prism-axis-label-font-size:11px;--prism-axis-label-padding:4px;--prism-axis-title-color:#111827;--prism-axis-title-font-size:12px;--prism-axis-title-padding:8px;--prism-legend-padding:8px;--prism-legend-symbol-size:64px;--prism-legend-label-color:#111827;--prism-legend-label-font-size:11px;--prism-legend-title-color:#111827;--prism-legend-title-font-size:12px;--prism-legend-title-font-weight:600;--prism-legend-row-padding:4px;--prism-title-color:#111827;--prism-title-font-size:16px;--prism-title-font-weight:600;--prism-title-anchor:start;--prism-title-padding:12px;--prism-view-bg:transparent;--prism-view-padding:0px;--prism-mark-fill:#4c78a8;--prism-mark-stroke-width:0px;--prism-mark-opacity:1;--prism-mark-arc-stroke:#ffffff;--prism-mark-arc-stroke-width:1px;--prism-mark-area-fill:#4c78a8;--prism-mark-area-opacity:0.7;--prism-mark-bar-fill:#4c78a8;--prism-mark-bar-corner-radius:0px;--prism-mark-geopoint-fill:#4c78a8;--prism-mark-geopoint-stroke-width:0px;--prism-mark-geopoint-size:36;--prism-mark-geoshape-fill:#cbd5e1;--prism-mark-geoshape-stroke:#ffffff;--prism-mark-geoshape-stroke-width:0.5px;--prism-mark-line-fill:transparent;--prism-mark-line-stroke:#4c78a8;--prism-mark-line-stroke-width:1.5px;--prism-mark-point-fill:#4c78a8;--prism-mark-point-stroke-width:0px;--prism-mark-point-size:64;--prism-mark-rule-stroke:#4c78a8;--prism-mark-rule-stroke-width:1px;--prism-mark-text-fill:#111827;--prism-mark-text-font-size:11px;--pri
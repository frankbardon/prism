<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <style>:root{--prism-color-axis:#6b7280;--prism-color-grid:#e5e7eb;--prism-color-text:#111827;--prism-color-bg:transparent;--prism-font-sans:Inter, system-ui, sans-serif;--prism-font-mono:ui-monospace, SF Mono, monospace;--prism-font-size-label:11px;--prism-font-size-title:16px;--prism-font-size-axis-title:12px;}.prism-axis-domain{stroke:var(--prism-color-axis);fill:none;}.prism-axis-tick{stroke:var(--prism-color-axis);}.prism-axis-label{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-label,11px);}.prism-axis-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-axis-title,12px);font-weight:600;}.prism-grid-line{stroke:var(--prism-color-grid);}.prism-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-title,16px);font-weight:600;}.prism-legend-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:12px;font-weight:600;}.prism-legend-label{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:11px;}.prism-legend-swatch{stroke:none;}.prism-selected{opacity:var(--prism-selected-opacity,1);}.prism-deselected{opacity:var(--prism-deselected-opacity,0.3);}</style>

  <g class="prism-scene" data-scene-id="scene-0">
    <text class="prism-title" x="410" y="20" text-anchor="middle">Session duration — long-tail distribution</text>
    <g class="prism-axes">
      <g class="prism-axis prism-axis-x" data-prism-axis-id="x-axis"><line class="prism-grid-line" x1="151" y1="50" x2="151" y2="560"/><line class="prism-grid-line" x1="274.333" y1="50" x2="274.333" y2="560"/><line class="prism-grid-line" x1="397.667" y1="50" x2="397.667" y2="560"/><line class="prism-grid-line" x1="521" y1="50" x2="521" y2="560"/><line class="prism-grid-line" x1="644.333" y1="50" x2="644.333" y2="560"/><line class="prism-grid-line" x1="767.667" y1="50" x2="767.667" y2="560"/><line class="prism-axis-domain" x1="40" y1="560" x2="780" y2="560"/><line class="prism-axis-tick" x1="151" y1="560" x2="151" y2="565"/><text class="prism-axis-label" x="151" y="578" text-anchor="middle">50</text><line class="prism-axis-tick" x1="212.667" y1="560" x2="212.667" y2="563"/><line class="prism-axis-tick" x1="274.333" y1="560" x2="274.333" y2="565"/><text class="prism-axis-label" x="274.333" y="578" text-anchor="middle">100</text><line class="prism-axis-tick" x1="336" y1="560" x2="336" y2="563"/><line class="prism-axis-tick" x1="397.667" y1="560" x2="397.667" y2="565"/><text class="prism-axis-label" x="397.667" y="578" text-anchor="middle">150</text><line class="prism-axis-tick" x1="459.333" y1="560" x2="459.333" y2="563"/><line class="prism-axis-tick" x1="521" y1="560" x2="521" y2="565"/><text class="prism-axis-label" x="521" y="578" text-anchor="middle">200</text><line class="prism-axis-tick" x1="582.667" y1="560" x2="582.667" y2="563"/><line class="prism-axis-tick" x1="644.333" y1="560" x2="644.333" y2="565"/><text class="prism-axis-label" x="644.333" y="578" text-anchor="middle">250</text><line class="prism-axis-tick" x1="706" y1="560" x2="706" y2="563"/><line class="prism-axis-tick" x1="767.667" y1="560" x2="767.667" y2="565"/><text class="prism-axis-label" x="767.667" y="578" text-anchor="middle">300</text><text class="prism-axis-title" x="410" y="594" text-anchor="middle">sec</text></g>
      <g class="prism-axis prism-axis-y" data-prism-axis-id="y-axis"><line class="prism-grid-line" x1="40" y1="560" x2="780" y2="560"/><line class="prism-grid-line" x1="40" y1="410" x2="780" y2="410"/><line class="prism-grid-line" x1="40" y1="260" x2="780" y2="260"/><line class="prism-grid-line" x1="40" y1="110" x2="780" y2="110"/><line class="prism-axis-domain" x1="40" y1="50" x2="40" y2="560"/><line class="prism-axis-tick" x1="40" y1="560" x2="35" y2="560"/><text class="prism-axis-label" x="32" y="564" text-anchor="end">0</text><line class="prism-axis-tick" x1="40" y1="485" x2="37" y2="485"/><line class="prism-axis-tick" x1="40" y1="410" x2="35" y2="410"/><line class="prism-axis-tick" x1="40" y1="335" x2="37" y2="335"/><line class="prism-axis-tick" x1="40" y1="260" x2="35" y2="260"/><text class="prism-axis-label" x="32" y="264" text-anchor="end">10</text><line class="prism-axis-tick" x1="40" y1="185" x2="37" y2="185"/><line class="prism-axis-tick" x1="40" y1="110" x2="35" y2="110"/><text class="prism-axis-title" x="10" y="305" text-anchor="middle" transform="rotate(-90 10 305)">count</text></g>
    </g>
    <g class="prism-plot">
      <g class="prism-layer" data-layer-id="layer-0" data-prism-layer="layer-0">
        <rect class="prism-mark-bar" data-prism-id="hist-0" x="40" y="50" width="123.333" height="510" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="hist-1" x="163.333" y="470" width="123.333" height="90" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="hist-2" x="286.667" y="500" width="123.333" height="60" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="hist-3" x="410" y="530" width="123.333" height="30" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="hist-4" x="533.333" y="530" width="123.333" height="30" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="hist-5" x="656.667" y="530" width="123.333" height="30" fill="#3b82f6"/>
      </g>
    </g>
  </g>
</svg>

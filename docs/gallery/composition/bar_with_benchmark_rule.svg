    <g class="prism-axis prism-axis-x" data-prism-axis-id="x-axis"><line class="prism-grid-line" x1="132.5" y1="50" x2="132.5" y2="560"/><line class="prism-grid-line" x1="317.5" y1="50" x2="317.5" y2="560"/><line class="prism-grid-line" x1="502.5" y1="50" x2="502.5" y2="560"/><line class="prism-grid-line" x1="687.5" y1="50" x2="687.5" y2="560"/><line class="prism-axis-domain" x1="40" y1="560" x2="780" y2="560"/><line class="prism-axis-tick" x1="132.5" y1="560" x2="132.5" y2="565"/><text class="prism-axis-label" x="132.5" y="578" text-anchor="middle">alpha</text><line class="prism-axis-tick" x1="317.5" y1="560" x2="317.5" y2="565"/><text class="prism-axis-label" x="317.5" y="578" text-anchor="middle">beta</text><line class="prism-axis-tick" x1="502.5" y1="560" x2="502.5" y2="565"/><text class="prism-axis-label" x="502.5" y="578" text-anchor="middle">gamma</text><line class="prism-axis-tick" x1="687.5" y1="560" x2="687.5" y2="565"/><text class="prism-axis-label" x="687.5" y="578" text-anchor="middle">delta</text><text class="prism-axis-title" x="410" y="594" text-anchor="middle">team</text></g>

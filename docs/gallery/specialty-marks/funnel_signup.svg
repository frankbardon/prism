<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <style>:root{--prism-color-axis:#6b7280;--prism-color-grid:#e5e7eb;--prism-color-text:#111827;--prism-color-bg:transparent;--prism-font-sans:Inter, system-ui, sans-serif;--prism-font-mono:ui-monospace, SF Mono, monospace;--prism-font-size-label:11px;--prism-font-size-title:16px;--prism-font-size-axis-title:12px;}.prism-axis-domain{stroke:var(--prism-color-axis);fill:none;}.prism-axis-tick{stroke:var(--prism-color-axis);}.prism-axis-label{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-label,11px);}.prism-axis-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-axis-title,12px);font-weight:600;}.prism-grid-line{stroke:var(--prism-color-grid);}.prism-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:var(--prism-font-size-title,16px);font-weight:600;}.prism-legend-title{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:12px;font-weight:600;}.prism-legend-label{fill:var(--prism-color-text);font-family:var(--prism-font-sans);font-size:11px;}.prism-legend-swatch{stroke:none;}.prism-selected{opacity:var(--prism-selected-opacity,1);}.prism-deselected{opacity:var(--prism-deselected-opacity,0.3);}</style>

  <g class="prism-scene" data-scene-id="scene-0">
    <text class="prism-title" x="410" y="20" text-anchor="middle">Signup funnel</text>
    <g class="prism-plot">
      <g class="prism-layer" data-layer-id="layer-0" data-prism-layer="layer-0">
        <path class="prism-mark-path" data-prism-id="funnel-stage-Visit" data-prism-datum-row="0" d="M40,50 L780,50 L558,177.5 L262,177.5 Z" fill="#3b82f6"/>
        <text class="prism-mark-text" data-prism-id="funnel-label-Visit" data-prism-datum-row="1" x="410" y="113.75" text-anchor="middle" font-size="12">1000</text>
        <path class="prism-mark-path" data-prism-id="funnel-stage-Signup" data-prism-datum-row="2" d="M262,177.5 L558,177.5 L484,305 L336,305 Z" fill="#ef4444"/>
        <text class="prism-mark-text" data-prism-id="funnel-label-Signup" data-prism-datum-row="3" x="410" y="241.25" text-anchor="middle" font-size="12">400</text>
        <path class="prism-mark-path" data-prism-id="funnel-stage-Activate" d="M336,305 L484,305 L447,432.5 L373,432.5 Z" fill="#10b981"/>
        <text class="prism-mark-text" data-prism-id="funnel-label-Activate" x="410" y="368.75" text-anchor="middle" font-size="12">200</text>
        <path class="prism-mark-path" data-prism-id="funnel-stage-Purchase" d="M373,432.5 L447,432.5 L447,560 L373,560 Z" fill="#f59e0b"/>
        <text class="prism-mark-text" data-prism-id="funnel-label-Purchase" x="410" y="496.25" text-anchor="middle" font-size="12">100</text>
      </g>
    </g>
    <g class="prism-legends"><g class="prism-legend prism-legend-color" data-prism-legend-id="legend-color"><text class="prism-legend-title" x="680" y="64">stage</text><rect class="prism-legend-swatch" x="680" y="76" width="12" height="12" fill="#3b82f6"/><text class="prism-legend-label" x="698" y="86">Visit</text><rect class="prism-legend-swatch" x="680" y="94" width="12" height="12" fill="#ef4444"/><text class="prism-legend-label" x="698" y="104">Signup</text><rect class="prism-legend-swatch" x="680" y="112" width="12" height="12" fill="#10b981"/><text class="prism-legend-label" x="698" y="122">Activate</text><rect class="prism-legend-swatch" x="680" y="130" width="12" height="12" fill="#f59e0b"/><text class="prism-legend-label" x="698" y="140">Purchase</text></g></g>
  </g>
</svg>

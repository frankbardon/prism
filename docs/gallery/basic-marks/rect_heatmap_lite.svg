      <g class="prism-axis prism-axis-y" data-prism-axis-id="y-axis"><line class="prism-grid-line" x1="40" y1="432.5" x2="780" y2="432.5"/><line class="prism-grid-line" x1="40" y1="177.5" x2="780" y2="177.5"/><line class="prism-axis-domain" x1="40" y1="50" x2="40" y2="560"/><line class="prism-axis-tick" x1="40" y1="432.5" x2="35" y2="432.5"/><text class="prism-axis-label" x="32" y="436.5" text-anchor="end">r1</text><line class="prism-axis-tick" x1="40" y1="177.5" x2="35" y2="177.5"/><text class="prism-axis-title" x="10" y="305" text-anchor="middle" transform="rotate(-90 10 305)">row</text></g>
    </g>
    <g class="prism-plot">
      <g class="prism-layer" data-layer-id="layer-0" data-prism-layer="layer-0">
        <rect class="prism-mark-bar" data-prism-id="rect-0" data-prism-datum-row="0" x="58.5" y="547.25" width="333" height="-229.5" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="rect-1" data-prism-datum-row="1" x="428.5" y="547.25" width="333" height="-229.5" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="rect-2" data-prism-datum-row="2" x="58.5" y="292.25" width="333" height="-229.5" fill="#3b82f6"/>
        <rect class="prism-mark-bar" data-prism-id="rect-3" data-prism-datum-row="3" x="428.5" y="292.25" width="333" height="-229.5" fill="#3b82f6"/>
      </g>
    </g>
  </g>
</svg>

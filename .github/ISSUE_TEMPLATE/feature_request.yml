name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement to Prism.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI
        - Spec vocabulary
        - Marks
        - Encoding / scales
        - Composition (layer / concat / facet / repeat)
        - Selections
        - Themes
        - Renderers (SVG / PDF / Canvas)
        - Multi-source / resolve
        - Service (Twirp / MCP)
        - Documentation
        - Other

name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Build with `make build`
        2. Run `bin/prism <command> ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, JSON envelope output, or rendered output if available.
    validations:
      required: true

  - type: textarea
    id: spec
    attributes:
      label: Spec / Input
      description: Minimal Prism spec or input that reproduces the bug (redact sensitive fields).
      render: json

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (cmd/prism)
        - Spec / Validate
        - Plan / Execute
        - Compile (Pulse compiler)
        - Encode (Scene IR / scales / axis / legend)
        - Render (SVG / PDF / Canvas)
        - Resolve (data sources)
        - Theme system
        - Service (Twirp / MCP)
        - Schema bundle
        - Errors / Codes
        - Init / Static bundle
        - Documentation
        - Other

  - type: input
    id: prism-version
    attributes:
      label: Prism Version
      placeholder: "prism v1.0.0"

  - type: input
    id: go-version
    attributes:
      label: Go Version
      placeholder: "1.26"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.5 / Ubuntu 24.04 / Windows 11"

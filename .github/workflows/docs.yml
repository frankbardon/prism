name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "static/**"
      - "cmd/prism/**"
      - "encode/**"
      - "plan/**"
      - "compile/**"
      - "render/**"
      - "spec/**"
      - "resolve/**"
      - "theme/**"
      - "scripts/build-versions-manifest.sh"
      - "scripts/build-root-redirect.sh"
      - ".github/workflows/docs.yml"
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # need all tags for the versions manifest.

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Build prism + compile gallery scenes + render mdBook
        run: make docs

      - name: Determine deploy slug
        id: slug
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "slug=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "slug=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage versioned tree + manifest + root redirect
        run: |
          mkdir -p deploy/${{ steps.slug.outputs.slug }}
          cp -r docs/book/* deploy/${{ steps.slug.outputs.slug }}/
          ./scripts/build-versions-manifest.sh > deploy/versions.json
          ./scripts/build-root-redirect.sh > deploy/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: deploy

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
